# Render 一键部署蓝图：https://render.com → New → Blueprint → 选本仓库
services:
  - type: web
    name: suxiaot
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY    # 在 Render 控制台填入你的真实密钥
        sync: false
      - key: AUTH_SECRET         # 自动生成一个随机强密钥
        generateValue: true
      # 如需数据持久化（付费磁盘），取消下面注释并在服务里挂载 /data 磁盘
      # - key: DB_PATH
      #   value: /data/data.db
